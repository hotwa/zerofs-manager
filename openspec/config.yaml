schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform
context: |
  Product: ZeroFS Manager, a SwiftUI macOS app distributed as a DMG.
  Tech stack: Swift 6.2, SwiftPM-first project, SwiftUI/AppKit where needed, ServiceManagement/SMAppService, XPC, Keychain, launchd, shell scripts only for packaging/verification.
  Target platform: Apple Silicon macOS 26 first, with architecture choices that should not block later universal builds.
  Runtime domain: manage a user-installed ZeroFS CLI backed by S3-compatible object storage such as MinIO. Current local validation uses zerofs 1.2.6 as a test baseline, not a hard pinned dependency. ZeroFS df output reflects configured virtual quota, not real object-store capacity.
  Security: secrets are primary in Keychain; root runtime files are generated by a privileged helper and must be root-only. Never log secrets.
  Distribution: support GitHub free/dev DMG without Apple Developer ID using user-authorized sudo/manual launchd workflows, plus a release-only Developer ID signed/notarized DMG. If signing credentials are absent, official-release mode must skip clearly without blocking github-dev.
  UX: Dashboard + Mount/Profile list. v1 exposes profile concept but restricts to one active profile; model and generated names must be profile-scoped for later multi-mount support.
  Existing reference setup: /Volumes/ZeroFS-lingyuzeng mounted through NFS from local ZeroFS service, with RPC moved to 17000 due local port 7000 conflict.

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours
rules:
  proposal:
    - Include explicit non-goals and security constraints.
    - Mention that v1 is highest-spec, not a throwaway sudo-script MVP.
  design:
    - Define process boundaries between app, login item, privileged helper, launchd-managed ZeroFS, Keychain, and runtime files.
    - Call out signing/notarization assumptions and local-development fallback.
  tasks:
    - Split root/privileged pieces from UI and testable domain code.
    - Include validation and packaging tasks.
    - Mark tasks that require Developer ID credentials or manual macOS approval.
